[gcode_macro _TIMELAPSE_VARIABLES]
variable_enable_timelapse: False # Standardmäßig aus beim Drucker-Neustart
gcode:

[gcode_macro START_PRINT]
gcode:
    RESPOND MSG="Preparing to print"
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    #SETUP_KAMP_MESHING DISPLAY_PARAMETERS=1 LED_ENABLE=1 FUZZ_ENABLE=1
    #SETUP_LINE_PURGE DISPLAY_PARAMETERS=1 ADAPTIVE_ENABLE=1 Z_HEIGHT=.3 PURGE_AMOUNT=20 LINE_LENGTH=25
    G90 # use absolute coordinates
    M83 # extruder relative mode
    RESPOND MSG="Warming up for bed leveling"
    M104 S170 # set extruder temp for bed leveling
    M140 S{BED_TEMP} # set bed temp 
    M109 S170 # wait for bed leveling temp
    #M190 S{BED_TEMP} ; wait for bed temp (korrigiert)
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP} ; wait for at least target temp
    G28 # home all axis
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE # KAMP Adaptive Mesh wird hier automatisch genutzt
    # --- NEU: KAMP Smart Park ---
    RESPOND MSG="Parking and heating extruder"
    SMART_PARK  
    # --- Extruder auf finale Temperatur heizen ---
    M109 S{EXTRUDER_TEMP}    
    # --- NEU: KAMP Line Purge ---
    RESPOND MSG="Purging line"
    LINE_PURGE
    RESPOND MSG="Print started!"

[gcode_macro END_PRINT]
gcode:
    #Fix-up extruder
    RESPOND MSG="Print Finished"
    G91
    G1 E-.5 Z0.2 F2400
    G1 X5 Y5 F6000
    G1 Z10
    G90

    #Present print
    G1 Z{printer.toolhead.position.z + 10} F600
    G1 X0 Y220 F6000
    M106 S0
    M104 S0
    M140 S0

    #TIMELAPSE_RENDER
    {% if printer["gcode_macro _TIMELAPSE_VARIABLES"].enable_timelapse %}
      TIMELAPSE_RENDER
    {% endif %}
    #Disable Steppers
    M84 X Y E

#=====================================================
# TIMELAPSE SWITCH
#=====================================================
[gcode_macro TIMELAPSE_ON]
gcode:
    SET_GCODE_VARIABLE MACRO=_TIMELAPSE_VARIABLES VARIABLE=enable_timelapse VALUE=True
    RESPOND MSG="Timelapse Modus: AKTIVIERT"

[gcode_macro TIMELAPSE_OFF]
gcode:
    SET_GCODE_VARIABLE MACRO=_TIMELAPSE_VARIABLES VARIABLE=enable_timelapse VALUE=False
    RESPOND MSG="Timelapse Modus: DEAKTIVIERT"


[gcode_macro TIMELAPSE_TAKE_FRAME_SMART]
gcode:
    {% if printer["gcode_macro _TIMELAPSE_VARIABLES"].enable_timelapse %}
        TIMELAPSE_TAKE_FRAME
    {% endif %}

#=====================================================
# PRESSURE ADVANCE
#=====================================================
# Run this macro before starting the print with file ender3/pressure_advance_<material>.stl
# Measure from the bottom to the point where you can spot the best quality edge use this value in mm
# calculate: measure start point (usually 0) + value in mm * 0.005 (factor for direct intruder)

[gcode_macro Pressure_Advance]
gcode:
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY=1 ACCEL=500
    TUNING_TOWER COMMAND=SET_PRESSURE_ADVANCE PARAMETER=ADVANCE START=0 FACTOR=.005


#=====================================================
# BUILD THE BED MESH
#=====================================================
# G29 that does (1) home all (2) get bed mesh (3) move 
# nozzle to corner so it doesnt ooze on the bed while heating up.
# Change save to "save=yourprinter_mesh" cant use default

[gcode_macro G29]
gcode:
    G28
    BED_MESH_CALIBRATE
    G0 X0 Y0 Z10 F6000
    BED_MESH_PROFILE save=default

#======================================================
# FILAMENT CHANGE
#======================================================

[gcode_macro Filament_Change]
gcode:
    M117 Filament Change
    M118 Filament Change
    SAVE_GCODE_STATE NAME=filament_change
    PAUSE
    G91 # relative
    G1 E-1 F300 # retract 1
    M125 # park
    G1 E-5 F300 # retract 5
    RESTORE_GCODE_STATE NAME=filament_change

######################################################################
# Filament Change during print
######################################################################

# M600: Filament Change. This macro will pause the printer, move the
# tool to the change position, and retract the filament 50mm. Adjust
# the retraction settings for your own extruder. After filament has
# been changed, the print can be resumed from its previous position
# with the "RESUME" gcode.

[pause_resume]

[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state


#=====================================================
# PARK PRINTER
#=====================================================

[gcode_macro M125]
gcode:
    SAVE_GCODE_STATE NAME=parking
    M117 Parking toolhead
    G91
    G1 Z10 F600 # move up 5 mm
    G90
    G1 X5 Y225 F4000 # move to park position
    RESTORE_GCODE_STATE NAME=parking

#=====================================================
# PAUSE
#=====================================================

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
gcode:
    ##### set defaults #####
    {% set x = params.X|default(5) %}      #edit to your park position
    {% set y = params.Y|default(225) %}      #edit to your park position
    {% set z = params.Z|default(10)|float %} #edit to your park position
    {% set e = params.E|default(1) %}        #edit to your retract length
    ##### calculate save lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% set lift_z = z|abs %}
    {% if act_z < (max_z - lift_z) %}
        {% set z_safe = lift_z %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    ##### end of definitions #####
    PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
        G1 E-{e} F2100
    {% else %}
        {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}    
    G1 Z{z_safe}
    G90
    G1 X{x} Y{y} F6000
    {% else %}
    {action_respond_info("Printer not homed")}
    {% endif %}

#=====================================================
# RESUME
#=====================================================

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    ##### set defaults #####
    {% set e = params.E|default(1) %} #edit to your retract length
    #### get VELOCITY parameter if specified ####
    {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
    {%else %}
    {% set get_params = "" %}
    {% endif %}
    ##### end of definitions #####
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E{e} F2100
    {% else %}
    {action_respond_info("Extruder not hot enough")}
    {% endif %}  
    RESUME_BASE {get_params}

#=====================================================
# CANCEL
#=====================================================

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    G0 X5 Y220 Z10 #raise extruder and clear
    CLEAR_PAUSE
    BASE_CANCEL_PRINT

#=====================================================
# KLIPPER BACKUP GIT
#=====================================================

[gcode_macro update_git]
gcode:
    RUN_SHELL_COMMAND CMD=update_git_script

[gcode_shell_command update_git_script]
command: bash /home/pi/klipper-backup/script.sh
timeout: 90.0
verbose: True

#=====================================================
# CALIBRATE Z OFFSET
#=====================================================

[gcode_macro calibrate_z_offset]
gcode:
    G91
    G1 Z10 F600 # move up 5 mm
    G90
    G0 X140 Y150  ; move to center
    PROBE_CALIBRATE

#=====================================================
# CALIBRATE PIDs
#=====================================================

[gcode_macro PID_calibrate_bed]
gcode:
    {% set temp = params.temp|default(60) %}
    PID_CALIBRATE HEATER=heater_bed TARGET={temp}

[gcode_macro PID_calibrate_extruder]
gcode:
    {% set temp = params.temp|default(200) %}
    PID_CALIBRATE HEATER=extruder TARGET={temp}

#=====================================================
# FILAMENTWECHSEL (M600 & Lade-Makros für Sprite Extruder)
#=====================================================

[gcode_macro M600]
description: Filamentwechsel starten
gcode:
    # Pausiert den Druck und fährt den Kopf nach vorne links. 
    # Z_MIN=50 sorgt dafür, dass genug Platz nach unten ist.
    PAUSE X=10 Y=10 Z_MIN=50

[gcode_macro UNLOAD_FILAMENT]
description: Filament auswerfen (Sprite Extruder)
gcode:
    {% if printer.extruder.temperature < 185 %}
        {action_respond_info("Extruder zu kalt zum Entladen! Bitte erst aufheizen.")}
    {% else %}
        SAVE_GCODE_STATE NAME=unload_state
        G91
        G1 E5 F300    # Kurz vorwärts, um den Schmelzpfropfen zu lösen
        G1 E-50 F1200 # 50mm schnell zurück (ausreichend für Sprite Direct Drive)
        RESTORE_GCODE_STATE NAME=unload_state
    {% endif %}

[gcode_macro LOAD_FILAMENT]
description: Filament laden (Sprite Extruder)
gcode:
    {% if printer.extruder.temperature < 185 %}
        {action_respond_info("Extruder zu kalt zum Laden! Bitte erst aufheizen.")}
    {% else %}
        SAVE_GCODE_STATE NAME=load_state
        G91
        G1 E40 F600   # 40mm zügig vorwärts bis zur Düse
        G1 E30 F300   # 30mm langsam nachschieben zum Spülen (Purge)
        RESTORE_GCODE_STATE NAME=load_state
    {% endif %}