
# 2020 Creality Ender 3 V2 

# This file contains pin mappings 
# To use this config, during "make menuconfig" select the
# STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
# communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]
[include macros.cfg]
[include KAMP_Settings.cfg]
[include shell_command.cfg]
[include moonraker_obico_macros.cfg]
[include timelapse.cfg]
[exclude_object]

#[include z-hop.cfg] # Using z-hop for firmware retraction

[respond]
#default_type: echo
#   Sets the default prefix of the "M118" and "RESPOND" output to one
#   of the following:
#       echo: "echo: " (This is the default)
#       command: "// "
#       error: "!! "
default_prefix: 
#   Directly sets the default prefix. If present, this value will
#   override the "default_type".

[idle_timeout]
# How long to wait in a PAUSE state before abandoning the print. Default is 10 minutes.
timeout: 21600	# 6 hours

[input_shaper]
shaper_freq_x: 68.8
shaper_type_x: mzv
shaper_freq_y: 44.4
shaper_type_y: mzv

[gcode_macro _TIMELAPSE_VARIABLES]
variable_enable_timelapse: False
gcode:
    # Nur ein Container für die Variable


[filament_switch_sensor Filament_runout_sensor]
pause_on_runout: False
switch_pin: ^PC15

runout_gcode:
  PAUSE
  G1 E-100 F600
#  G91
#  G1 Z20 F900      # Raise Z away from print
#  G90
#  G1 X245 Y218.5 F5000 # Move to purge area
#  G91
#  G92 E0.0
#  G1 E-100 F600 # Retract 450mm of filament
#  G90
insert_gcode:
#  G4 P10000 # Pause for 10 seconds
  G1 E150 F400 # Prime the nozzle
  LINE_PURGE
#  RESUME # auskommentiert: Gemini empfehlung
  RESPOND MSG="Filament geladen. Bitte Düse reinigen und manuell auf Resume klicken."
event_delay: 6.0
pause_delay: 0.5
switch_pin: PA4 # Pin that the sensor is connected to


[bltouch]
sensor_pin: ^PC14
control_pin: PA1
x_offset: -31.8
y_offset: -40.5

speed:35
samples:3
samples_result: average
sample_retract_dist: 3.0      # Verringert den Weg zwischen den Messungen - Gemini empfehlung
samples_tolerance_retries: 3  # laut gemini von 10 auf 3
samples_tolerance: 0.015 # von 0.0075 auf 0.015
probe_with_touch_mode: true
stow_on_each_sample: false

[safe_z_home]
home_xy_position: 147, 154
speed: 75
z_hop: 10
z_hop_speed: 5
move_to_previous: true

[pause_resume]
recover_velocity: 25

[bed_mesh]
speed: 120
horizontal_move_z: 8
mesh_min: 15,15
mesh_max: 188,186
probe_count: 7,7
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 250
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 250
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 240
position_min: -2

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.800 # Erhöht für Dual-Z Motoren

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
gear_ratio: 42:12
rotation_distance: 26.359
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
min_temp: 0
max_temp: 300
max_extrude_cross_section: 5

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650

[heater_bed]
heater_pin: PC9  # <--- HIER von PA2 auf PC9 ändern (HB)
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4  # (Diesen Pin so belassen, er ist korrekt für THB)
min_temp: 0
max_temp: 130
#control = pid
# pid_kp = 68.928
# pid_ki = 1.081
# pid_kd = 1098.546

# Bauteillüfter (K-FAN) - Steckt in FAN0
[fan]
pin: PC6

# Hotend-Lüfter (Sprite Extruder Kühlkörper) - Steckt in FAN1
[heater_fan hotend_fan]
pin: PC7
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# Mainboard-Gehäuselüfter - Steckt in FAN2
[controller_fan board_fan]
pin: PB15
stepper: stepper_x, stepper_y, stepper_z, extruder
idle_timeout: 60

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_0F00490013504D5930313820-if00
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 2500 # von 3500 auf 2500 laut Gemini
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5

[bed_screws]
screw1: 25, 205 # Using rear left to take measurements as harder to reach
screw1_name: rear left screw
screw2: 195, 205
screw2_name: rear right screw
screw3: 195, 35
screw3_name: front right screw
screw4: 25, 35
screw4_name: front left screw

[screws_tilt_adjust]
screw1: 57, 229
screw1_name: rear left screw
screw2: 227, 229
screw2_name: rear right screw
screw3: 227, 70
screw3_name: front right screw
screw4: 57, 70
screw4_name: front left screw
horizontal_move_z: 10
speed: 50
screw_thread: CW-M3 # Use CW for Clowise and CCW for Counter Clockwise


[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 80 # Gemini von 100 auf 80

#[temperature_sensor mcu_temp]
#sensor_type: temperature_mcu
#min_temp: 0
#max_temp: 100

[firmware_retraction]
retract_length: 0.8
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
retract_speed: 45
#   The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
unretract_speed: 40
#   The speed of unretraction, in mm/s. The default is 10 mm/s.

